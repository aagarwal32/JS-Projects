<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="calculator">
        <div id="screen"></div>
        <div id="btn-board">
            <div class="row">
                <div class="btn clear">CLEAR</div>
                <div class="btn op divide">/</div>
            </div>
            <div class="row">
                <div class="btn seven">7</div>
                <div class="btn eight">8</div>
                <div class="btn nine">9</div>
                <div class="btn op mult">x</div>
            </div> 
            <div class="row">
                <div class="btn four">4</div>
                <div class="btn five">5</div>
                <div class="btn six">6</div>
                <div class="btn op sub">-</div>
            </div>
            <div class="row">
                <div class="btn one">1</div>
                <div class="btn two">2</div>
                <div class="btn three">3</div>
                <div class="btn op add">+</div>
            </div>
            <div class="row">
                <div class="btn zero">0</div>
                <div class="btn dec">.</div>
                <div class="btn equal">ENTER</div>
            </div>
        </div>
    </div>
</body>
</html>
